<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>האפליקציה</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F7F8FC;
            margin: 0;
            padding: 24px;
            color: #1A1A2E;
        }

        .screen {
            display: none;
        }

        .active {
            display: block;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #2C3E7A;
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .container,
        .login-container {
            max-width: 380px;
            margin: 0 auto;
            background: #FFFFFF;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.08);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .required {
            color: red;
            margin-right: 4px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }

        .primary-btn {
            width: 100%;
            background-color: #4F46E5;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .secondary-text {
            margin-top: 16px;
            font-size: 14px;
            text-align: center;
            color: #6B7280;
        }

        .secondary-text a,
        .forgot-password a,
        .guest-link a {
            color: #4F46E5;
            text-decoration: underline;
            font-weight: 600;
            cursor: pointer;
        }

        .guest-link {
            text-align: left;
            margin-top: 10px;
        }

        .file-upload {
            border: 1px dashed #6B7280;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            color: #4F46E5;
            font-weight: 600;
            margin-bottom: 24px;
        }
    </style>

    <script>
        function show(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
    </script>

</head>

<body>

    <!-- מסך 1 — כניסה -->
    <div id="screen1" class="screen active">
        <div class="logo">הקמפוס 🎓</div>

        <div class="login-container">
            <form action="Main_Feed.html">
                <h1>כניסה</h1>

                <label>שם משתמש</label>
                <input type="text" placeholder="הקלד/י שם משתמש">

                <label>סיסמה</label>
                <input type="password" placeholder="הקלד/י סיסמה">

                <div class="forgot-password">
                    <a onclick="show('screen2')">לא זוכר את הסיסמה?</a>
                </div>

                <button class="primary-btn" type="submit">התחברות</button>

                <div class="secondary-text">
                    סטודנט חדש? <a onclick="show('screen3')">צור חשבון</a>
                </div>

                <div class="guest-link">
                    <a>מצב אורח</a>
                </div>
            </form>

        </div>
    </div>

    <!-- מסך 2 — איפוס סיסמה -->
    <div id="screen2" class="screen">
        <div class="logo">הקמפוס 🎓</div>

        <div class="container">
            <h1>איפוס סיסמה</h1>

            <label>הכנס/י כתובת מייל לקבלת קוד אימות</label>
            <input type="email" placeholder="example@mail.com">

            <!--  שליחת קוד אימות -->
            <button class="primary-btn" style="margin-top: -4px;" onclick="this.style.display='none'">
                שלח קוד אימות
            </button>




            <label>הכנס/י את קוד האימות שהתקבל</label>
            <input type="text" placeholder="הקלד/י את הקוד">

            <button class="primary-btn" onclick="show('screen1')">סיום</button>
        </div>
    </div>

    <!-- מסך 3 — יצירת חשבון -->
    <div id="screen3" class="screen">
        <div class="logo">הקמפוס 🎓</div>

        <div class="container">
            <h1>יצירת חשבון</h1>

            <label><span class="required">*</span>שם מלא</label>
            <input type="text">

            <label><span class="required">*</span>תעודת זהות</label>
            <input type="text">

            <label>גיל</label>
            <input type="number">

            <label><span class="required">*</span>מגדר</label>
            <select>
                <option>בחר/י מגדר</option>
                <option>זכר</option>
                <option>נקבה</option>
                <option>אחר</option>
            </select>

            <label><span class="required">*</span>ארץ</label>
            <input type="text">

            <label><span class="required">*</span>עיר</label>
            <input type="text">

            <label><span class="required">*</span>כתובת (רחוב ומספר)</label>
            <input type="text">

            <label><span class="required">*</span>תחום לימודים</label>
            <input type="text">

            <label>שנה בתואר</label>
            <select>
                <option>בחר/י שנה</option>
                <option>שנה א'</option>
                <option>שנה ב'</option>
                <option>שנה ג'</option>
                <option>שנה ד'</option>
            </select>


            <label>העלאת תמונת פרופיל</label>
            <input type="file" accept="image/*" style="margin-bottom: 20px;">

            <label><span class="required">*</span>אישור לימודים</label>
            <input type="file" accept=".pdf,.jpg,.jpeg,.png" style="margin-bottom: 20px;">


            <button class="primary-btn" onclick="show('screen4')">סיום</button>
        </div>
    </div>
    <!-- מסך 4 — הרשמה הושלמה -->
    <div id="screen4" class="screen">
        <div class="logo">הקמפוס 🎓</div>

        <div class="container">
            <h1>פרטיך נקלטו בהצלחה!</h1>
            <p>ברוך הבא לקמפוס 🙂</p>

            <button class="primary-btn" onclick="show('screen1')">חזרה לעמוד הכניסה</button>
        </div>
    </div>

</body>

</html>
